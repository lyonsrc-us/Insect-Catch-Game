<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Catch The Flower</title>
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="screen">
      <h1>Catch The Flower</h1>
      <button class="btn" id="start-btn">Play Game</button>
    </div>

    <div class="screen">
      <h1>What is your "favorite" Flower?</h1>
      <ul class="insects-list">
        <li>
          <button class="choose-insect-btn">
            <p>rose</p>
            <img src="images/rose.png" alt="rose">
          </button>
        </li>
        <li>
          <button class="choose-insect-btn">
            <p>sunflower</p>
            <img
               src="images/sunflower.png"
               alt="sunflower"
               />
          </button>
        </li>
        <li>
          <button class="choose-insect-btn">
            <p>poppy</p>
            <img
               src="images/poppy.png"
               alt="poppy"
               />
          </button>
        </li>
        <li>
          <button class="choose-insect-btn">
            <p>marigold</p>
            <img
               src="images/orange.png"
               alt="marigold"
               />
          </button>
        </li>
      </ul>
    </div>

    <div class="screen game-container" id="game-container">
      <h3 id="time" class="time">Time: 00:00</h3>
      <h3 id="score" class="score">Score: 0</h3>
      <h5 id="message" class="message">
        Are you annoyed yet? <br>
        You are playing an impossible game!
      </h5>
    </div>
  </body>
</html>
